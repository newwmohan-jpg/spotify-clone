<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify clone -Mohan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="nav">
            <ul>
                <div class="left">
                    <li><img id="Logo" src="spotify_logo.png" alt="spotify logo"></li>
                </div>
                <div class="centre">
                    <li><img id="homeBtn" src="home_icon.png" alt="home button"></li>
                    
                    <li>
                        <form><input type="text" placeholder="what do you want to play"></form>
                    </li>
                </div>
                <div class="right">
                    <li><a href="Premium">Premium</a></li>
                    <li><a href="Support">Support</a></li>
                    <li><a href="Download">Download</a></li>
                    <li><img id = "divider" src="vertical_line.png" alt=""></li>
                    <li><a id="insApp" href="Install app">Install App</a></li>
                    <li><a id="signUp" href="sign up">Sign up</a></li>
                    <li><button id="loginBtn">Log in</button></li>
                </div>
            </ul>
        </div>

    </header>
    <main>
        <div class="box1">
            <div class="line1">
                <b id="lib">Your Library</b>
                <button id ="crt">+ Create</button>
            </div>
            <div class="childBox11">
                <b>Create your first playlist</b>
                <p>it's easy we'll help you</p>
                <button id="crt_Ply">Create playlist</button>
            </div>
            <div class="childBox12">
                <b>Let's find some podcast to follow</b>
                <p>we'll keep you updated on new episodes</p>
                <button id="brs_Pod">Browse podcasts</button>
            </div>

            <div class="links">
                <a href="">Legal</a>
                <a href="">Safety & Privacy Center</a>
                <a href="">Privacy Policy</a>
                <a href="">cookies</a>
                <a href="">About Ads</a>
                <a href="">Accessibility</a>
                <a class="white" href="">Cookies</a>
            </div>

            <div class="lang">
                <button><img src="globe.png" alt="globe">English</button>
            </div>

        </div>
        <div class="box2">

        </div>

    </main>
    <footer>

    </footer>

    <script src="script.js"></script>
</body>

</html>
